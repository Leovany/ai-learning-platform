server:
  port: 8080

spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: ai-learning-platform
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: jdbc:sqlite:${APP_DATA_DIR:./data}/db/learning.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

app:
  data-dir: ${APP_DATA_DIR:./data}
  upload-dir: ${APP_DATA_DIR:./data}/uploads
  llm:
    # DeepSeek: https://api-docs.deepseek.com/zh-cn/
    api-base: ${LLM_API_BASE:https://api.deepseek.com}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:deepseek-v4-flash}
  quiz:
    default-count: ${QUIZ_DEFAULT_COUNT:10}
    max-count: ${QUIZ_MAX_COUNT:30}
