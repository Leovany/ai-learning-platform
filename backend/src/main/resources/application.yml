server:
  port: 8080

spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: ai-learning-platform
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: jdbc:sqlite:${APP_DATA_DIR:./data}/db/learning.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

app:
  data-dir: ${APP_DATA_DIR:./data}
  upload-dir: ${APP_DATA_DIR:./data}/uploads
  llm:
    # 当前生效：zhipu | deepseek | auto（根据 LLM_MODEL 前缀 glm/deepseek 自动选择）
    provider: ${LLM_PROVIDER:auto}
    model: ${LLM_MODEL:}
    zhipu:
      api-base: ${ZHIPU_API_BASE:https://open.bigmodel.cn/api/paas/v4}
      api-key: ${ZHIPU_API_KEY:}
      default-model: ${ZHIPU_DEFAULT_MODEL:glm-4.7-flash}
    deepseek:
      api-base: ${DEEPSEEK_API_BASE:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:}
      default-model: ${DEEPSEEK_DEFAULT_MODEL:deepseek-chat}
  quiz:
    default-count: ${QUIZ_DEFAULT_COUNT:10}
    max-count: ${QUIZ_MAX_COUNT:30}
