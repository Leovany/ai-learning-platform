services:
  backend:
    build: ./backend
    container_name: ai-learning-backend
    env_file:
      - .env
    environment:
      APP_DATA_DIR: /app/data
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      LLM_MODEL: ${LLM_MODEL:-glm-4.7-flash}
      ZHIPU_API_BASE: ${ZHIPU_API_BASE:-https://open.bigmodel.cn/api/paas/v4}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      ZHIPU_DEFAULT_MODEL: ${ZHIPU_DEFAULT_MODEL:-glm-4.7-flash}
      DEEPSEEK_API_BASE: ${DEEPSEEK_API_BASE:-https://api.deepseek.com}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_DEFAULT_MODEL: ${DEEPSEEK_DEFAULT_MODEL:-deepseek-chat}
      QUIZ_DEFAULT_COUNT: ${QUIZ_DEFAULT_COUNT:-10}
      QUIZ_MAX_COUNT: ${QUIZ_MAX_COUNT:-30}
    volumes:
      - ./data:/app/data
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: ai-learning-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
